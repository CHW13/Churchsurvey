name: Deploy Next.js to GitHub Pages

on:
  push:
    branches: ["main"] # main 브랜치에 코드가 푸시되면 자동으로 실행됩니다.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24" # 본인이 사용하는 Node.js 버전에 맞게 수정하세요 (예: 18, 20)

      - name: Install dependencies
        run: npm ci # 만약 yarn을 쓰신다면 'yarn install'로 변경하세요.

      - name: Build with Next.js
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out # 이전에 고생해서 만든 out 폴더를 배포용으로 업로드합니다.

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4